<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>UNews</title>
</head>
<body>
    <header class="position-relative bg-white">
        <img src="media/unesc.png" alt="logo unews" class="position-absolute top-0 start-0">
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#">Jornal</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#">Notícias</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#">Esportes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#">Entretenimento</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main class="container mt-4">
        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1" aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2" aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="media/banner1.jpg" class="d-block w-100" alt="Notícia 1">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Últimas Notícias</h5>
                        <p>Fique por dentro das novidades.</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="media/banner2.jpg" class="d-block w-100" alt="Notícia 2">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Esportes em Destaque</h5>
                        <p>As melhores coberturas esportivas.</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="media/banner3.jpg" class="d-block w-100" alt="Notícia 3">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Entretenimento</h5>
                        <p>Divirta-se com o melhor conteúdo.</p>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
        <div class="news mt-4">
        </div>
    </main>
    <footer class="bg-dark text-white text-center py-3 fixed-bottom">
        &copy; 2024 UNews. Todos os direitos reservados.
    </footer>

</body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
